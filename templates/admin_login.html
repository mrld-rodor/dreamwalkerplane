<!-- 
    ============================================================================
    ADMIN_LOGIN.HTML - DreamWalker Plane
    ============================================================================
    Página de login para administradores acessarem a área de moderação de relatos
    ============================================================================
-->

{% extends "base.html" %}

{% block title %}Admin Login - DreamWalker Plane{% endblock %}

{% block content %}
<div class="bg-mystic min-h-screen flex items-center justify-center py-12">
    
    <div class="container mx-auto px-4 max-w-md">
        
        <!-- Logo -->
        <div class="text-center mb-8">
            <img src="{{ url_for('static', filename='images/amiraldo_logo_transparent_white.png') }}" 
                 alt="DreamWalker Logo" 
                 class="w-24 h-auto rounded-full shadow-dream mx-auto mb-4">
            <h1 class="text-2xl font-orbitron text-white">Área Administrativa</h1>
            <p class="text-gray-400 text-sm mt-2">Acesso restrito - Moderação de Relatos</p>
        </div>
        
        <!-- Formulário de Login -->
        <div class="dream-card p-8" data-anime="up">
            <form method="POST" action="{{ url_for('relatos.admin_login') }}">
                
                <div class="mb-6">
                    <label for="senha" class="block text-white font-orbitron mb-2">
                        <i class="bi bi-lock mr-2"></i> Senha de Acesso
                    </label>
                    <input type="password" 
                           id="senha" 
                           name="senha" 
                           required
                           class="w-full bg-dream-gray border border-dream-purple/50 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-dream-purple transition"
                           placeholder="Digite a senha administrativa">
                </div>
                
                <button type="submit" 
                        class="w-full bg-dream-purple hover:bg-dream-purple-light text-white font-orbitron py-3 rounded-lg transition-all duration-300">
                    <i class="bi bi-box-arrow-in-right mr-2"></i> Acessar
                </button>
                
            </form>
            
            <div class="mt-6 text-center">
                <a href="{{ url_for('relatos.mural') }}" class="text-gray-500 hover:text-dream-purple text-sm transition">
                    <i class="bi bi-arrow-left mr-1"></i> Voltar ao Mural
                </a>
            </div>
        </div>
        
        <!-- Aviso -->
        <div class="text-center mt-6 text-gray-500 text-xs">
            <i class="bi bi-shield-lock"></i> Esta área é restrita aos administradores do site
        </div>
        
    </div>
</div>
{% endblock %}
